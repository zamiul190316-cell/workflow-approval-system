{% extends 'workflow_app/base.html' %}
{% block title %}Edit Group{% endblock %}
{% block header_title %}Edit Approval Group{% endblock %}

{% block content %}
<div class="page-header">
  <div><div class="page-title">Edit: {{ group.name }}</div></div>
  <a href="{% url 'manage_groups' %}" class="btn btn-outline">← Back</a>
</div>

<form method="post">
{% csrf_token %}
<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
  <div class="card">
    <div class="card-header"><span class="card-title">Group Details</span></div>
    <div class="card-body">
      <div class="form-group">
        <label class="form-label">Group Name *</label>
        <input type="text" name="name" class="form-control" value="{{ group.name }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="3">{{ group.description }}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Division</label>
        <select name="division" class="form-control">
          <option value="">— None —</option>
          {% for div in divisions %}<option value="{{ div.pk }}" {% if group.division_id == div.pk %}selected{% endif %}>{{ div.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
          <input type="checkbox" name="is_active" {% if group.is_active %}checked{% endif %}> Active
        </label>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Save Changes</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">👥 Members</span>
      <span id="memberCount" class="badge badge-in_progress">0 selected</span>
    </div>
    <div class="card-body">
      <input type="text" id="memberSearch" class="form-control" placeholder="🔍 Search..."
        oninput="filterMembers()" style="margin-bottom:12px;">
      <div id="memberList" style="max-height:400px;overflow-y:auto;">
        {% for u in all_users %}
        <label style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;border-bottom:1px solid var(--border-color);margin:0;" class="member-row"
          data-name="{{ u.get_full_name|lower|default:u.username }}"
          onmouseover="this.style.background='rgba(255,255,255,.04)'" onmouseout="this.style.background='none'">
          <input type="checkbox" name="members" value="{{ u.pk }}"
            {% if u.pk in current_member_ids %}checked{% endif %}
            onchange="updateCount()" style="width:16px;height:16px;">
          <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue-accent),var(--violet-accent));display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;flex-shrink:0;">
            {{ u.first_name|first|upper }}{{ u.last_name|first|upper }}
          </div>
          <div>
            <div style="font-size:.88rem;font-weight:600;">{{ u.get_full_name|default:u.username }}</div>
            <div style="font-size:.75rem;color:var(--text-muted);">{{ u.employee_id|default:"N/A" }} · {{ u.get_role_display }}</div>
          </div>
        </label>
        {% endfor %}
      </div>
    </div>
  </div>
</div>
</form>

<script>
function filterMembers() {
  const q = document.getElementById('memberSearch').value.toLowerCase();
  document.querySelectorAll('.member-row').forEach(r => {
    r.style.display = r.dataset.name.includes(q) ? '' : 'none';
  });
}
function updateCount() {
  const c = document.querySelectorAll('input[name="members"]:checked').length;
  document.getElementById('memberCount').textContent = c + ' selected';
}
updateCount();
</script>
{% endblock %}
